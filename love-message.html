<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lato:wght@300&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0010 0%, #4a0030 40%, #8b0050 70%, #ff2060 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
  }

  /* Floating hearts background */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart-particle {
    position: absolute;
    bottom: -60px;
    font-size: 1.5rem;
    animation: floatUp linear infinite;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
  }

  /* Couple SVG scene */
  .scene {
    position: relative;
    z-index: 1;
    margin-bottom: 30px;
    animation: sceneEntrance 1.2s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes sceneEntrance {
    from { opacity: 0; transform: scale(0.7) translateY(40px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Message */
  .message {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: msgEntrance 1.4s 0.4s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes msgEntrance {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .love-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3rem, 10vw, 6rem);
    color: #fff;
    text-shadow: 0 0 30px rgba(255,100,150,0.9), 0 0 60px rgba(255,60,120,0.5);
    letter-spacing: 2px;
    line-height: 1.1;
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(255,100,150,0.9), 0 0 60px rgba(255,60,120,0.5); }
    50%       { text-shadow: 0 0 50px rgba(255,150,180,1),   0 0 90px rgba(255,80,140,0.8); }
  }

  .sub-text {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: rgba(255,220,235,0.85);
    margin-top: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* Heart ribbon */
  .ribbon {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,180,210,0.8);
    font-size: 1.5rem;
  }

  .ribbon span { font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,200,220,0.7); }

  /* Glow orb behind couple */
  .glow-orb {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,100,160,0.35) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50%       { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }
</style>
</head>
<body>

<!-- Floating hearts -->
<div class="hearts-bg" id="heartsContainer"></div>

<!-- Couple scene -->
<div class="scene">
  <div style="position:relative;">
    <div class="glow-orb"></div>
    <svg viewBox="0 0 320 280" width="320" height="280" xmlns="http://www.w3.org/2000/svg" style="position:relative;z-index:1;">

      <!-- Moonlight / backdrop halo -->
      <ellipse cx="160" cy="240" rx="110" ry="22" fill="rgba(255,80,140,0.18)"/>

      <!-- ===== PERSON LEFT (she) ===== -->
      <!-- Dress -->
      <path d="M90 170 Q80 220 70 260 Q100 265 115 260 Q118 215 120 180Z" fill="#c2185b"/>
      <path d="M120 180 Q125 215 128 260 Q143 265 155 260 Q148 220 135 170Z" fill="#ad1457"/>
      <!-- Body -->
      <rect x="100" y="130" width="40" height="52" rx="12" fill="#fce4ec"/>
      <!-- Neck -->
      <rect x="115" y="115" width="14" height="20" rx="6" fill="#fce4ec"/>
      <!-- Head -->
      <ellipse cx="122" cy="105" rx="22" ry="24" fill="#fce4ec"/>
      <!-- Hair (flowing) -->
      <path d="M100 95 Q95 70 110 58 Q122 50 134 58 Q149 70 144 95 Q138 80 122 78 Q106 80 100 95Z" fill="#880e4f"/>
      <path d="M100 95 Q88 110 92 130" stroke="#880e4f" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M144 95 Q150 115 145 135" stroke="#880e4f" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Eyes (closed, kissing) -->
      <path d="M112 104 Q115 101 118 104" stroke="#880e4f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M126 104 Q129 101 132 104" stroke="#880e4f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Lips puckered right -->
      <ellipse cx="130" cy="113" rx="5" ry="3.5" fill="#f06292"/>
      <!-- Blush -->
      <ellipse cx="109" cy="111" rx="7" ry="4" fill="rgba(240,100,140,0.25)"/>
      <!-- Left arm around him -->
      <path d="M140 140 Q165 125 180 130" stroke="#fce4ec" stroke-width="9" fill="none" stroke-linecap="round"/>

      <!-- ===== PERSON RIGHT (he) ===== -->
      <!-- Suit pants -->
      <path d="M175 170 Q165 220 162 260 Q175 265 185 260 Q188 215 190 180Z" fill="#37474f"/>
      <path d="M190 180 Q193 215 195 260 Q208 265 218 260 Q215 220 205 170Z" fill="#263238"/>
      <!-- Suit jacket -->
      <rect x="172" y="128" width="46" height="48" rx="10" fill="#37474f"/>
      <!-- Shirt/tie -->
      <rect x="186" y="128" width="18" height="40" rx="4" fill="#eceff1"/>
      <polygon points="193,130 197,130 195,160" fill="#b71c1c"/>
      <!-- Lapels -->
      <polygon points="172,128 186,128 178,155" fill="#263238"/>
      <polygon points="218,128 204,128 212,155" fill="#263238"/>
      <!-- Neck -->
      <rect x="186" y="113" width="14" height="20" rx="6" fill="#ffe0b2"/>
      <!-- Head -->
      <ellipse cx="193" cy="100" rx="23" ry="25" fill="#ffe0b2"/>
      <!-- Hair (short, neat) -->
      <path d="M170 95 Q172 70 193 65 Q214 70 216 95 Q210 78 193 76 Q176 78 170 95Z" fill="#3e2723"/>
      <!-- Eyes (closed, kissing) -->
      <path d="M182 100 Q185 97 188 100" stroke="#3e2723" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M198 100 Q201 97 204 100" stroke="#3e2723" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Lips puckered left -->
      <ellipse cx="180" cy="109" rx="5" ry="3.5" fill="#ff8a65"/>
      <!-- Blush -->
      <ellipse cx="207" cy="107" rx="7" ry="4" fill="rgba(255,120,80,0.2)"/>
      <!-- Right arm around her shoulder -->
      <path d="M172 140 Q145 130 130 138" stroke="#ffe0b2" stroke-width="9" fill="none" stroke-linecap="round"/>

      <!-- Floating hearts near kiss -->
      <text x="148" y="80" font-size="14" fill="#ff4081" opacity="0.9" style="animation:none">♥</text>
      <text x="158" y="65" font-size="10" fill="#ff80ab" opacity="0.7">♥</text>
      <text x="165" y="78" font-size="16" fill="#f50057" opacity="0.85">♥</text>

    </svg>
  </div>
</div>

<!-- Message -->
<div class="message">
  <div class="love-text">I Love You</div>
  <div class="sub-text">With every heartbeat &amp; every breath</div>
  <div class="ribbon">
    <span>❤</span>
    <span>Forever &amp; Always</span>
    <span>❤</span>
  </div>
</div>

<script>
  // Spawn floating heart particles
  const container = document.getElementById('heartsContainer');
  const emojis = ['❤️','💕','💖','💗','💓','💘','💝','🌹'];

  function spawnHeart() {
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
    const dur = Math.random() * 6 + 5;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 3) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), (dur + 3) * 1000);
  }

  // Initial burst
  for (let i = 0; i < 18; i++) setTimeout(spawnHeart, i * 200);
  // Continuous stream
  setInterval(spawnHeart, 600);
</script>
</body>
</html>
